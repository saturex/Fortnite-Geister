<title>Fortnite Sprites – Checkliste</title>
<style>
  :root {
    color-scheme: light;
    --panel: rgba(255,255,255,.94);
    --ink: #15171a;
    --accent: #e52b36;
    --muted: #68717c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #d9f5ff, #edfaff);
    color: var(--ink);
  }
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: .65rem;
    padding: .8rem max(1rem, env(safe-area-inset-left));
    background: var(--panel);
    border-bottom: 1px solid rgba(0,0,0,.12);
    box-shadow: 0 4px 18px rgba(0,0,0,.08);
  }
  .toolbar strong { margin-right: auto; }
  .status {
    color: var(--muted);
    font-size: .92rem;
    white-space: nowrap;
  }
  .count {
    font-weight: 750;
    color: var(--ink);
  }
  button.action, label.action {
    appearance: none;
    border: 1px solid rgba(0,0,0,.18);
    border-radius: .65rem;
    background: white;
    color: var(--ink);
    padding: .58rem .8rem;
    font: inherit;
    font-weight: 650;
    cursor: pointer;
  }
  button.action:hover, label.action:hover { background: #f4f6f8; }
  button.danger { color: #b31924; }
  main {
    width: min(100%, 930px);
    margin: 1rem auto 2rem;
    padding: 0 .65rem;
  }

<script>
(() => {
  const STORAGE_KEY = "fortnite-sprites-checkliste-v1";
  const checks = [...document.querySelectorAll(".sprite-check")];
  const countEl = document.getElementById("count");

  function readState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      return Array.isArray(saved) ? saved : [];
    } catch {
      return [];
    }
  }

  let selected = new Set(readState().map(Number).filter(n => Number.isInteger(n) && n >= 0 && n < checks.length));

  function render() {
    checks.forEach((button, index) => {
      const active = selected.has(index);
      button.classList.toggle("selected", active);
      button.setAttribute("aria-pressed", String(active));
    });
    countEl.textContent = `${selected.size} / ${checks.length}`;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...selected].sort((a,b) => a-b)));
  }

  checks.forEach((button, index) => {
    button.addEventListener("click", () => {
      selected.has(index) ? selected.delete(index) : selected.add(index);
      save();
      render();
    });
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Wirklich alle Markierungen entfernen?")) return;
    selected.clear();
    save();
    render();
  });

  document.getElementById("exportBtn").addEventListener("click", () => {
    const data = {
      app: "Fortnite Sprites Checkliste",
      version: 1,
      savedAt: new Date().toISOString(),
      selected: [...selected].sort((a,b) => a-b)
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "fortnite-sprites-stand.json";
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  document.getElementById("importFile").addEventListener("change", async event => {
    const file = event.target.files?.[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      const values = Array.isArray(data) ? data : data.selected;
      if (!Array.isArray(values)) throw new Error("Ungültiges Format");
      selected = new Set(values.map(Number).filter(n => Number.isInteger(n) && n >= 0 && n < checks.length));
      save();
      render();
    } catch {
      alert("Die Datei konnte nicht geladen werden.");
    }
    event.target.value = "";
  });

  render();
})();
</script>
