<script>
(() => {
  const KEY = "fortnite-geister-115-clean-v1";
  const buttons = [...document.querySelectorAll(".ghost-check")];
  const counter = document.getElementById("counter");
  let selected = new Set();

  try {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if (Array.isArray(saved)) {
      selected = new Set(saved.filter(n => Number.isInteger(n) && n >= 0 && n < buttons.length));
    }
  } catch {}

  function save() {
    localStorage.setItem(KEY, JSON.stringify([...selected].sort((a,b) => a-b)));
  }

  function render() {
    buttons.forEach((button, index) => {
      const active = selected.has(index);
      button.classList.toggle("selected", active);
      button.setAttribute("aria-pressed", String(active));
    });
    counter.textContent = `${selected.size} / 115 gesammelt`;
  }

  buttons.forEach((button, index) => {
    button.addEventListener("click", () => {
      selected.has(index) ? selected.delete(index) : selected.add(index);
      save();
      render();
    });
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Wirklich alle Markierungen entfernen?")) return;
    selected.clear();
    save();
    render();
  });

  render();
})();
</script>
